<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keven Marini | Portfolio</title>
    <link rel="stylesheet" href="style.css?v=5.0">

    <!-- BRAND NEW PREMIUM SIDEBAR STYLES -->
    <style>
        #premium-sidebar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 380px !important;
            height: 100vh !important;
            background: #000 !important;
            z-index: 1000000000 !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 40px !important;
            box-shadow: 40px 0 100px rgba(0, 0, 0, 0.95) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
            transform: translateX(-100%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1) !important;
            visibility: hidden;
        }

        #premium-sidebar.active {
            transform: translateX(0);
            visibility: visible;
        }

        .ps-header {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            margin-bottom: 10px !important;
            position: relative !important;
            min-height: 50px !important;
        }

        .ps-name {
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            font-size: 1.4rem !important;
            font-weight: 900 !important;
            color: #fff !important;
            letter-spacing: 2px !important;
            white-space: nowrap !important;
        }

        .ps-close {
            font-size: 3rem !important;
            font-weight: 900 !important;
            cursor: pointer !important;
            color: #fff !important;
        }

        /* Removed grid row positioning */

        .ps-line {
            height: 6px !important;
            width: 100% !important;
            background: #fff !important;
            margin: 10px 0 !important;
        }

        .ps-links {
            display: flex !important;
            flex-direction: column !important;
            gap: 25px !important;
            margin: 20px 0 !important;
            text-align: center !important;
            overflow-y: auto !important;
            scrollbar-width: none !important;
            flex: 1 !important;
        }

        .ps-links::-webkit-scrollbar {
            display: none !important;
        }

        .ps-links a {
            font-size: 1.8rem !important;
            font-weight: 900 !important;
            color: #fff !important;
            text-decoration: none !important;
            text-transform: uppercase !important;
            opacity: 0.7 !important;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1) !important;
            letter-spacing: 2px !important;
        }

        .ps-links a:hover {
            opacity: 1 !important;
            transform: scale(1.05) !important;
            letter-spacing: 4px !important;
        }

        .ps-footer {
            margin-top: 20px !important;
            text-align: center !important;
        }

        .ps-text {
            font-size: 0.9rem !important;
            line-height: 1.6 !important;
            color: rgba(255, 255, 255, 0.5) !important;
            letter-spacing: 1px !important;
            text-transform: uppercase !important;
        }

        .ps-scroll-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: auto;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        .ps-scroll-hint span {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .ps-scroll-hint i {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, #fff, transparent);
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        @media (max-width: 768px) {
            #premium-sidebar {
                width: 100% !important;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="image3.png" id="dynamic-favicon">
</head>

<body class="intro-mode">

    <!-- Decorative Background -->
    <div class="prism-bg">
        <div class="prism-blob blob-1"></div>
        <div class="prism-blob blob-2"></div>
        <div class="prism-blob blob-3"></div>
    </div>

    <div class="page-transition" id="page-transition"></div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <h1 class="name">KEVEN MARINI</h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Intro Content -->
    <div id="main-content" class="main-content" style="display: none;">
        <div class="reveal active">
            <h2 class="section-label">System Initialized</h2>
            <div class="skill-display-container">
                <h3 id="skill-display" class="skill-display"></h3>
            </div>
            <button id="enter-btn" class="enter-btn">Explore Portfolio</button>
        </div>
    </div>

    <!-- Portfolio Content Moved to home.html -->



    <script src="script.js"></script>
</body>

</html>
