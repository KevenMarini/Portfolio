<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Test | Keven Marini</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* FORCED STYLES FOR TEST */
    #pro-sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 380px !important;
        height: 100vh !important;
        background: #000 !important;
        z-index: 99999999 !important;
        display: none !important;
        flex-direction: column !important;
        padding: 60px 40px !important;
        box-shadow: 20px 0 100px rgba(0,0,0,0.95) !important;
        border-right: 1px solid rgba(255,255,255,0.1) !important;
    }
    #pro-sidebar.active {
        display: flex !important;
    }
    .pro-header {
        display: flex !important;
        align-items: center !important;
        gap: 25px !important;
        margin-bottom: 20px !important;
    }
    .pro-name {
        font-size: 1.4rem !important;
        font-weight: 800 !important;
        color: #ff0000 !important; /* RED TEST */
    }
    .pro-close {
        font-size: 2.2rem !important;
        cursor: pointer !important;
        color: #ff0000 !important; /* RED TEST */
    }
    .pro-line {
        height: 3px !important;
        width: 100% !important;
        background: #ff0000 !important; /* RED TEST */
        margin: 15px 0 !important;
    }
    .pro-links {
        display: flex !important;
        flex-direction: column !important;
        gap: 25px !important;
        margin: 40px 0 !important;
    }
    .pro-links a {
        font-size: 1.2rem !important;
        font-weight: 700 !important;
        color: #fff !important;
        text-decoration: none !important;
        text-transform: uppercase !important;
        opacity: 0.6 !important;
    }
    .pro-footer-text {
        font-size: 1rem !important;
        color: #ff0000 !important; /* RED TEST */
        margin-top: 20px !important;
    }
  </style>
</head>
<body class="intro-mode">
    <div id="portfolio-content">
        <nav>
            <div class="menu-toggle" id="menu-toggle" style="cursor:pointer; padding:20px; color:white; font-size:2rem;">☰ MENU</div>
        </nav>

        <div class="pro-sidebar" id="pro-sidebar">
            <div class="pro-header">
                <span class="pro-name">KEVEN MARINI</span>
                <span class="pro-close" id="pro-sidebar-close">✕</span>
            </div>
            
            <div class="pro-line"></div>

            <nav class="pro-links">
                <a href="#">HOME</a>
                <a href="#">ABOUT US</a>
                <a href="#">ACADEMICS</a>
                <a href="#">PROJECTS</a>
                <a href="#">SKILLS</a>
                <a href="#">COMPETITIONS</a>
                <a href="#">CONTACT</a>
            </nav>

            <div class="pro-line"></div>

            <div class="pro-footer">
                <p class="pro-footer-text">Building the future of AI & Embedded Systems through innovation.</p>
            </div>
        </div>
    </div>

    <script>
        // Simple Toggle Script for Test
        const toggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('pro-sidebar');
        const close = document.getElementById('pro-sidebar-close');

        if(toggle && sidebar) {
            toggle.onclick = () => sidebar.classList.add('active');
        }
        if(close && sidebar) {
            close.onclick = () => sidebar.classList.remove('active');
        }
    </script>
</body>
</html>
