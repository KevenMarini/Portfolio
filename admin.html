<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Core | Keven Marini</title>
    <link rel="stylesheet" href="style.css?v=5.0">
    <style>
        :root {
            --admin-accent: #a01eff;
            --admin-bg: #030014;
            --sidebar-w: 300px;
            --admin-border: rgba(255, 255, 255, 0.08);
        }

        body.portfolio-mode {
            background-color: var(--admin-bg);
            background-image: radial-gradient(circle at top right, rgba(160, 30, 255, 0.05) 0%, transparent 50%);
            margin: 0;
            overflow: hidden; /* Prevent body scrolling, use inner scroll */
        }

        .dashboard-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR */
        .dashboard-sidebar {
            width: var(--sidebar-w);
            background: rgba(3, 0, 20, 0.95);
            border-right: 1px solid var(--admin-border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .sidebar-header {
            padding: 40px 30px;
            border-bottom: 1px solid var(--admin-border);
        }

        .sidebar-header h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            color: var(--accent-cyan);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidebar-nav {
            list-style: none;
            padding: 20px 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            padding: 18px 30px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.02);
        }

        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-cyan);
        }

        .sidebar-footer {
            padding: 30px;
            border-top: 1px solid var(--admin-border);
        }

        /* MAIN AREA */
        .dashboard-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: transparent;
        }

        .main-header {
            padding: 40px 60px;
            border-bottom: 1px solid var(--admin-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 0, 20, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .main-header h1 {
            font-size: 2.2rem;
            color: #fff;
            margin: 0;
        }

        .main-workspace {
            padding: 60px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* CARDS & GRIDS */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--admin-border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .data-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .data-card h4 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            margin-top: 0;
            color: #fff;
        }

        .data-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .data-card strong {
            color: #fff;
        }
        
        .data-card .tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 10px;
            color: var(--accent-cyan);
        }

        .card-actions {
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--admin-border);
            padding-top: 20px;
            margin-top: auto;
        }

        /* BUTTONS */
        .btn-action {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--admin-border);
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .btn-edit:hover { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); }
        .btn-delete:hover { background: var(--accent-pink); color: #fff; border-color: var(--accent-pink); }
        
        .btn-add-global {
            padding: 14px 28px;
            background: white;
            color: black;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .btn-add-global:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* MODALS */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 20, 0.9);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-inner {
            background: #0a0a0f;
            border: 1px solid var(--admin-border);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-inner h3 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #fff;
            margin-top: 0;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 0.9rem; color: var(--text-secondary); }
        .input-group input, .input-group textarea {
            width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--admin-border);
            border-radius: 12px; color: #fff; font-size: 1rem; transition: var(--transition-smooth); box-sizing: border-box;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent-cyan); outline: none; background: rgba(255, 255, 255, 0.06); }

        /* LOGIN */
        .login-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--admin-bg); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.03); border: 1px solid var(--admin-border); padding: 50px; border-radius: 32px; width: 450px; text-align: center; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="portfolio-mode">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="login-wrap">
        <div class="login-card reveal active">
            <h2 class="section-label">Restricted Area</h2>
            <h1 style="margin-bottom: 30px;">System Login</h1>
            <div class="input-group">
                <input type="password" id="pass-field" placeholder="Access Password">
            </div>
            <button class="btn-primary" onclick="login()" style="width: 100%;">Initialize Connection</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <h2>KM. Admin</h2>
                <p>Control Center</p>
            </div>
            <ul class="sidebar-nav" id="sidebar-nav">
                <li class="nav-item active" onclick="switchTab('profile', this)">Identity & Profile</li>
                <li class="nav-item" onclick="switchTab('experience', this)">Experience</li>
                <li class="nav-item" onclick="switchTab('project', this)">Projects</li>
                <li class="nav-item" onclick="switchTab('skill', this)">Skills</li>
                <li class="nav-item" onclick="switchTab('certification', this)">Certifications</li>
                <li class="nav-item" onclick="switchTab('education', this)">Education</li>
            </ul>
            <div class="sidebar-footer">
                <a href="home.html" class="btn-action" style="display: block; text-align: center; margin-bottom: 15px; text-decoration: none;">Live Site ↗</a>
                <button class="btn-action btn-delete" style="width: 100%" onclick="logout()">Terminate Session</button>
            </div>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="dashboard-main">
            <header class="main-header">
                <h1 id="current-tab-title">Identity & Profile</h1>
                <div id="header-actions">
                    <button class="btn-add-global" onclick="openProfileModal()">Update Profile</button>
                </div>
            </header>

            <div class="main-workspace" id="main-workspace">
                <!-- Data renders here -->
            </div>
        </main>
    </div>

    <!-- ENTRY MODAL (Dynamic) -->
    <div id="modal-container" class="modal">
        <div class="modal-inner">
            <h3 id="modal-title">Edit Component</h3>
            <div id="modal-fields" class="form-grid"></div>
            <div class="card-actions" style="margin-top: 40px;">
                <button class="btn-primary" onclick="saveEntry()" style="padding: 14px 40px;">Save Changes</button>
                <button class="btn-action" onclick="closeModal()">Dismiss</button>
            </div>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div id="modal-profile" class="modal">
        <div class="modal-inner">
            <h3>Identity Configuration</h3>
            <div class="form-grid">
                <div class="input-group"><label>Full Name</label><input type="text" id="prof-name"></div>
                <div class="input-group"><label>Location</label><input type="text" id="prof-location"></div>
                <div class="input-group full-width"><label>Hero Subtitle</label><input type="text" id="prof-subtitle"></div>
                <div class="input-group"><label>Hero Badge</label><input type="text" id="prof-hero_badge"></div>
                <div class="input-group"><label>Email</label><input type="text" id="prof-email"></div>
                <div class="input-group"><label>Phone</label><input type="text" id="prof-phone"></div>
                <div class="input-group"><label>LinkedIn URL</label><input type="text" id="prof-linkedin"></div>
                <div class="input-group"><label>GitHub URL</label><input type="text" id="prof-github"></div>
                <div class="input-group"><label>Current Year</label><input type="text" id="prof-current_year"></div>
                <div class="input-group"><label>Projects Count</label><input type="text" id="prof-project_count"></div>
                <div class="input-group"><label>Clubs Count</label><input type="text" id="prof-club_count"></div>
                <div class="input-group"><label>Languages</label><input type="text" id="prof-languages"></div>
                <div class="input-group full-width"><label>Career Objective / About Text</label><textarea id="prof-about_text" rows="4"></textarea></div>
            </div>
            <div class="card-actions" style="margin-top: 40px;">
                <button class="btn-primary" onclick="saveProfile()" style="padding: 14px 40px;">Update Identity</button>
                <button class="btn-action" onclick="closeModal()">Dismiss</button>
            </div>
        </div>
    </div>

    <script>
        let adminPass = localStorage.getItem('adminPass');
        let currentTab = 'profile';
        let currentType = '';
        let currentId = null;
        let allData = {};

        if(adminPass) document.getElementById('login-screen').style.display = 'none';

        function login() {
            adminPass = document.getElementById('pass-field').value;
            localStorage.setItem('adminPass', adminPass);
            document.getElementById('login-screen').style.display = 'none';
            loadData();
        }

        function logout() {
            localStorage.removeItem('adminPass');
            location.reload();
        }

        const config = {
            profile: { title: 'Identity & Profile' },
            experience: { title: 'Experience', fields: ['role', 'organization', 'description', 'date'] },
            project: { title: 'Selected Projects', fields: ['title', 'description', 'tags', 'link', 'date'] },
            skill: { title: 'Technical Stack', fields: ['name', 'category'] },
            certification: { title: 'Certifications', fields: ['name', 'status', 'link'] },
            education: { title: 'Education', fields: ['degree', 'institution', 'year', 'score', 'score_label'] }
        };

        function switchTab(tabId, element) {
            currentTab = tabId;
            
            // Update nav styles
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            // Update Header
            document.getElementById('current-tab-title').textContent = config[tabId].title;
            const actionContainer = document.getElementById('header-actions');
            if (tabId === 'profile') {
                actionContainer.innerHTML = `<button class="btn-add-global" onclick="openProfileModal()">Update Profile</button>`;
            } else {
                actionContainer.innerHTML = `<button class="btn-add-global" onclick="openEntryModal('${tabId}')">+ New Entry</button>`;
            }

            renderWorkspace();
        }

        function renderWorkspace() {
            const container = document.getElementById('main-workspace');
            container.innerHTML = '';

            if (currentTab === 'profile') {
                if (!allData.profile) return;
                container.innerHTML = `
                    <div class="items-grid">
                        <div class="data-card">
                            <h4>Basic Info</h4>
                            <p><strong>Name:</strong> ${allData.profile.name}</p>
                            <p><strong>Location:</strong> ${allData.profile.location}</p>
                            <p><strong>Year:</strong> ${allData.profile.current_year}</p>
                        </div>
                        <div class="data-card">
                            <h4>Contact</h4>
                            <p><strong>Email:</strong> ${allData.profile.email}</p>
                            <p><strong>Phone:</strong> ${allData.profile.phone}</p>
                            <p><strong>GitHub:</strong> ${allData.profile.github}</p>
                        </div>
                        <div class="data-card full-width" style="grid-column: 1 / -1;">
                            <h4>About & Objective</h4>
                            <p>${allData.profile.about_text}</p>
                        </div>
                    </div>
                `;
            } else {
                // Determine JSON array key (handle pluralization)
                let key = currentTab + 's';
                if (currentTab === 'experience' || currentTab === 'education') key = currentTab;
                
                const sectionData = allData[key] || [];
                
                if (sectionData.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-secondary); text-align: center; margin-top: 50px;">No entries found. Click '+ New Entry' to add one.</p>`;
                    return;
                }

                container.innerHTML = `
                    <div class="items-grid">
                        ${sectionData.map(item => `
                            <div class="data-card">
                                <div>
                                    ${item.tags ? `<div style="margin-bottom: 10px;">${item.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>` : ''}
                                    <h4>${item.role || item.title || item.name || item.degree}</h4>
                                    <p>${item.organization || item.institution || item.category || item.status || ''}</p>
                                    ${item.description ? `<p style="font-size: 0.85rem; opacity: 0.7;">${item.description.substring(0, 100)}...</p>` : ''}
                                </div>
                                <div class="card-actions">
                                    <button class="btn-action btn-edit" onclick="openEntryModal('${currentTab}', ${item.id})">Edit</button>
                                    <button class="btn-action btn-delete" onclick="deleteItem(${item.id}, '${currentTab}')">Delete</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        async function loadData() {
            try {
                const res = await fetch('/api/data');
                allData = await res.json();
                renderWorkspace();
            } catch (err) {
                console.error("Failed to load data", err);
            }
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function openProfileModal() {
            if(allData.profile) {
                Object.keys(allData.profile).forEach(k => {
                    const el = document.getElementById(`prof-${k}`);
                    if(el) el.value = allData.profile[k];
                });
            }
            document.getElementById('modal-profile').style.display = 'flex';
        }

        function openEntryModal(type, id = null) {
            currentType = type;
            currentId = id;
            document.getElementById('modal-title').textContent = (id ? 'Modify ' : 'Add New ') + config[type].title;
            
            const container = document.getElementById('modal-fields');
            container.innerHTML = config[type].fields.map(f => `
                <div class="input-group ${f === 'description' || f === 'tags' ? 'full-width' : ''}">
                    <label>${f.charAt(0).toUpperCase() + f.slice(1)}</label>
                    ${f === 'description' ? `<textarea id="field-${f}" rows="5"></textarea>` : `<input type="text" id="field-${f}">`}
                </div>
            `).join('');

            if(id) {
                let key = type + 's';
                if (type === 'experience' || type === 'education') key = type;
                
                const item = allData[key].find(x => x.id === id);
                config[type].fields.forEach(f => document.getElementById(`field-${f}`).value = item[f] || '');
            }
            
            document.getElementById('modal-container').style.display = 'flex';
        }

        async function saveProfile() {
            const data = {};
            ['name', 'subtitle', 'hero_badge', 'email', 'phone', 'linkedin', 'github', 'about_text', 'location', 'languages', 'project_count', 'club_count', 'current_year'].forEach(f => {
                data[f] = document.getElementById(`prof-${f}`).value;
            });
            await apiPost('profile', data);
        }

        async function saveEntry() {
            const data = { id: currentId };
            config[currentType].fields.forEach(f => data[f] = document.getElementById(`field-${f}`).value);
            await apiPost(currentType, data);
        }

        async function apiPost(type, data) {
            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPass, type, data })
                });
                if(res.ok) {
                    closeModal();
                    loadData();
                } else {
                    alert('Connection failed. Verify password.');
                }
            } catch (err) {
                alert('API Error');
            }
        }

        async function deleteItem(id, type) {
            if(!confirm('This action cannot be undone. Proceed?')) return;
            try {
                const res = await fetch(`/api/admin?id=${id}&type=${type}&password=${adminPass}`, { method: 'DELETE' });
                if(res.ok) loadData();
            } catch (err) {
                alert('API Error');
            }
        }

        if(adminPass) loadData();
    </script>
</body>
</html>
