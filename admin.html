<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Keven Marini</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 120px 5% 60px; max-width: 1000px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; }
        input, textarea, select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-light);
            border-radius: 8px; color: white; font-family: inherit;
        }
        .admin-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-light); }
        .delete-btn { color: var(--accent-pink); cursor: pointer; background: none; border: none; font-weight: 700; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: 1px solid var(--border-light); background: none; color: white; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--accent-purple); border-color: var(--accent-purple); }
    </style>
</head>
<body class="portfolio-mode">
    <div id="login-overlay" class="login-overlay">
        <div class="card" style="width: 400px;">
            <h3>Admin Login</h3>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Enter Admin Password">
            </div>
            <button class="btn-primary" onclick="login()" style="width: 100%;">Access Dashboard</button>
        </div>
    </div>

    <nav>
        <div class="nav-logo">KM. Admin</div>
        <div class="nav-links">
            <a href="index.html">View Site</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="admin-container reveal active">
        <div class="admin-header">
            <h2>Manage Portfolio</h2>
            <div class="hero-badge" id="status"><span></span>System Ready</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('content')">General Content</button>
            <button class="tab-btn" onclick="switchTab('profile')">Site Configuration (Hero/About)</button>
        </div>

        <!-- Site Configuration Tab -->
        <div id="tab-profile" style="display: none;">
            <div class="admin-card">
                <h3>Site Identity & Hero</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="prof-name" placeholder="KEVEN MARINI">
                </div>
                <div class="form-group">
                    <label>Hero Subtitle</label>
                    <input type="text" id="prof-subtitle" placeholder="ECE Undergraduate at VIT...">
                </div>
                <div class="form-group">
                    <label>Hero Badge Text</label>
                    <input type="text" id="prof-hero_badge" placeholder="Open for Internships 2026">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="prof-email" placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="prof-phone" placeholder="+91...">
                </div>
                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="text" id="prof-linkedin">
                </div>
                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="text" id="prof-github">
                </div>
                <div class="form-group">
                    <label>Career Objective / About Text</label>
                    <textarea id="prof-about_text" rows="4"></textarea>
                </div>
                <button class="btn-primary" onclick="saveProfile()">Update Site Config</button>
            </div>
        </div>

        <!-- General Content Tab -->
        <div id="tab-content">
            <div class="admin-card">
                <h3>Add New Entry</h3>
                <div class="form-group">
                    <label>Type</label>
                    <select id="entry-type">
                        <option value="project">Project</option>
                        <option value="experience">Experience</option>
                        <option value="skill">Skill</option>
                        <option value="education">Education</option>
                    </select>
                </div>
                <div id="form-fields"></div>
                <button class="btn-primary" onclick="saveEntry()">Save Entry</button>
            </div>

            <div class="admin-card">
                <h3>Existing Records</h3>
                <div id="data-list">
                    <p>Loading records...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminPass = localStorage.getItem('adminPass');
        if(adminPass) document.getElementById('login-overlay').style.display = 'none';

        function login() {
            adminPass = document.getElementById('admin-pass').value;
            localStorage.setItem('adminPass', adminPass);
            document.getElementById('login-overlay').style.display = 'none';
            loadData();
        }

        function logout() {
            localStorage.removeItem('adminPass');
            location.reload();
        }

        function switchTab(tab) {
            document.getElementById('tab-content').style.display = tab === 'content' ? 'block' : 'none';
            document.getElementById('tab-profile').style.display = tab === 'profile' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        const fields = {
            project: ['title', 'description', 'tags', 'link', 'date'],
            experience: ['role', 'organization', 'description', 'date'],
            skill: ['name', 'category'],
            education: ['degree', 'institution', 'year', 'score', 'score_label']
        };

        document.getElementById('entry-type').onchange = renderFields;
        function renderFields() {
            const type = document.getElementById('entry-type').value;
            const container = document.getElementById('form-fields');
            container.innerHTML = fields[type].map(f => `
                <div class="form-group">
                    <label>${f.charAt(0).toUpperCase() + f.slice(1)}</label>
                    ${f === 'description' ? `<textarea id="field-${f}" rows="3"></textarea>` : `<input type="text" id="field-${f}">`}
                </div>
            `).join('');
        }
        renderFields();

        async function saveProfile() {
            const data = {};
            ['name', 'subtitle', 'hero_badge', 'email', 'phone', 'linkedin', 'github', 'about_text'].forEach(f => {
                data[f] = document.getElementById(`prof-${f}`).value;
            });

            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: adminPass, type: 'profile', data })
            });

            if(res.ok) alert('Profile updated!');
            else alert('Error updating profile.');
        }

        async function saveEntry() {
            const type = document.getElementById('entry-type').value;
            const data = {};
            fields[type].forEach(f => data[f] = document.getElementById(`field-${f}`).value);

            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: adminPass, type, data })
            });

            if(res.ok) {
                alert('Saved successfully!');
                loadData();
            } else {
                alert('Error saving.');
            }
        }

        async function loadData() {
            const res = await fetch('/api/data');
            const data = await res.json();
            
            if(data.profile) {
                Object.keys(data.profile).forEach(k => {
                    const el = document.getElementById(`prof-${k}`);
                    if(el) el.value = data.profile[k];
                });
            }

            const list = document.getElementById('data-list');
            list.innerHTML = '';
            ['projects', 'experience', 'skills', 'education'].forEach(type => {
                if(data[type].length) {
                    list.innerHTML += `<h4>${type.toUpperCase()}</h4>`;
                    data[type].forEach(item => {
                        list.innerHTML += `
                            <div class="data-item">
                                <span>${item.title || item.role || item.name || item.degree}</span>
                                <button class="delete-btn" onclick="deleteItem(${item.id}, '${type.slice(0,-1)}')">Delete</button>
                            </div>
                        `;
                    });
                }
            });
        }

        async function deleteItem(id, type) {
            if(!confirm('Delete this item?')) return;
            const res = await fetch(`/api/admin?id=${id}&type=${type}&password=${adminPass}`, { method: 'DELETE' });
            if(res.ok) loadData();
        }

        if(adminPass) loadData();
    </script>
</body>
</html>
