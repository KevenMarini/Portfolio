<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Keven Marini</title>
    <link rel="stylesheet" href="style.css?v=5.0">
    <style>
        body {
            padding-top: 100px;
        }
        .page-container {
            min-height: 80vh;
            padding: 0 5%;
            max-width: 1000px; /* narrowed for better reading layout of vertical projects list */
            margin: 0 auto;
        }
        .projects-list-wrapper {
            width: 100%;
            margin-top: 40px;
        }
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 20px 0;
            width: 100%;
        }
        .projects-list .proj-card {
            width: 100%;
            min-width: 100%;
            flex-shrink: 0;
            scroll-snap-align: none;
            padding: 40px;
        }

        @media (min-width: 900px) {
            .page-container {
                max-width: 1200px;
            }
            .projects-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 40px;
            }
            .projects-list .proj-card {
                min-width: 0;
            }
        }
    </style>
</head>

    <div class="prism-bg">

                <div class="projects-list-wrapper reveal active">
                    <div class="projects-list" id="dynamic-projects-list">
                        <!-- Dynamically populated from script.js -->
